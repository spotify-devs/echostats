name: echostats

services:
  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    restart: unless-stopped
    command: ["mongod", "--wiredTigerCacheSizeGB", "0.25", "--quiet"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-echostats}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-echostats}
    volumes:
      - mongo_data:/data/db
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - internal

  # ── API (FastAPI) ────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    environment:
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET}
      SPOTIFY_REDIRECT_URI: ${SPOTIFY_REDIRECT_URI:-http://localhost:8000/api/v1/auth/callback}
      MONGO_URI: mongodb://${MONGO_USER:-echostats}:${MONGO_PASSWORD:-changeme}@mongodb:27017/${MONGO_DB:-echostats}?authSource=admin
      MONGO_DB: ${MONGO_DB:-echostats}
      REDIS_URL: redis://redis:6379/0
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
      API_WORKERS: ${API_WORKERS:-2}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      SYNC_INTERVAL_MINUTES: ${SYNC_INTERVAL_MINUTES:-15}
      ANALYTICS_REFRESH_HOURS: ${ANALYTICS_REFRESH_HOURS:-6}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - internal
      - external

  # ── Worker (background sync & analytics) ─────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    command: ["uv", "run", "arq", "app.tasks.worker.WorkerSettings"]
    environment:
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET}
      SPOTIFY_REDIRECT_URI: ${SPOTIFY_REDIRECT_URI:-http://localhost:8000/api/v1/auth/callback}
      MONGO_URI: mongodb://${MONGO_USER:-echostats}:${MONGO_PASSWORD:-changeme}@mongodb:27017/${MONGO_DB:-echostats}?authSource=admin
      MONGO_DB: ${MONGO_DB:-echostats}
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-info}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      SYNC_INTERVAL_MINUTES: ${SYNC_INTERVAL_MINUTES:-15}
      ANALYTICS_REFRESH_HOURS: ${ANALYTICS_REFRESH_HOURS:-6}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  # ── Web (Next.js) ────────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      INTERNAL_API_URL: http://api:8000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal
      - external

volumes:
  mongo_data:
  redis_data:

networks:
  internal:
    driver: bridge
  external:
    driver: bridge
