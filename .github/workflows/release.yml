name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write

jobs:
  version-tag:
    name: Version & Tag
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.bump.outputs.new_tag }}
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version bump
        id: bump
        run: |
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi
          echo "Latest tag: $LATEST"

          MAJOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f1)
          MINOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f2)
          PATCH=$(echo "$LATEST" | sed 's/v//' | cut -d. -f3)

          if [ "$LATEST" = "v0.0.0" ]; then
            COMMITS=$(git log --oneline)
          else
            COMMITS=$(git log "${LATEST}..HEAD" --oneline)
          fi

          if echo "$COMMITS" | grep -qiE '^[a-f0-9]+ (feat!|BREAKING)'; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif echo "$COMMITS" | grep -qiE '^[a-f0-9]+ feat'; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "New tag: $NEW_TAG"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.bump.outputs.new_tag }}" -m "Release ${{ steps.bump.outputs.new_tag }}"
          git push origin "${{ steps.bump.outputs.new_tag }}"

  docker:
    name: Docker · ${{ matrix.image }}
    needs: version-tag
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: api
            file: api/Dockerfile
          - image: web
            file: web/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-${{ matrix.image }}:${{ needs.version-tag.outputs.version }}
            ghcr.io/${{ github.repository }}-${{ matrix.image }}:latest
          build-args: |
            APP_VERSION=${{ needs.version-tag.outputs.version }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  helm:
    name: Publish Helm Chart
    needs: version-tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package and push chart
        run: |
          helm package helm/echostats \
            --version ${{ needs.version-tag.outputs.version }} \
            --app-version ${{ needs.version-tag.outputs.version }}
          helm push echostats-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts

  release-notes:
    name: Create GitHub Release
    needs: [version-tag, docker, helm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        run: |
          TAG="${{ needs.version-tag.outputs.new_tag }}"
          VERSION="${{ needs.version-tag.outputs.version }}"
          PREV=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | grep -v "^${TAG}$" | head -1)

          if [ -n "$PREV" ]; then
            CHANGELOG=$(git log "${PREV}..HEAD" --pretty=format:"- %s (@%an)" --no-merges)
            COMPARE="**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV}...${TAG}"
          else
            CHANGELOG=$(git log --pretty=format:"- %s (@%an)" --no-merges -20)
            COMPARE=""
          fi

          cat > release-notes.md << NOTES_EOF
          ## 🎵 EchoStats ${TAG}

          ### 📦 Docker Images

          \`\`\`bash
          # Backend API
          docker pull ghcr.io/${{ github.repository }}-api:${VERSION}

          # Web Frontend
          docker pull ghcr.io/${{ github.repository }}-web:${VERSION}
          \`\`\`

          ### ⎈ Helm Chart

          \`\`\`bash
          helm install echostats oci://ghcr.io/${{ github.repository_owner }}/charts/echostats --version ${VERSION}
          \`\`\`

          ### 📝 Changes

          ${CHANGELOG}

          ${COMPARE}

          ### 📋 Assets

          | Asset | Tag |
          |-------|-----|
          | API Image | \`ghcr.io/${{ github.repository }}-api:${VERSION}\` |
          | Web Image | \`ghcr.io/${{ github.repository }}-web:${VERSION}\` |
          | Helm Chart | \`oci://ghcr.io/${{ github.repository_owner }}/charts/echostats:${VERSION}\` |
          NOTES_EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version-tag.outputs.new_tag }}
          name: EchoStats ${{ needs.version-tag.outputs.new_tag }}
          body_path: release-notes.md
          generate_release_notes: false

  docs:
    name: Deploy Docs
    needs: version-tag
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install & build docs
        working-directory: docs
        run: |
          npm install
          npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

      - id: deployment
        uses: actions/deploy-pages@v4
