# EchoStats Helm Values

# Override the full name of resources (default: {release}-echostats)
# Set this to "echostats" for cleaner pod names like "echostats-api"
fullnameOverride: ""
# nameOverride: ""

replicaCount:
  api: 1
  web: 1
  worker: 1

image:
  api:
    repository: ghcr.io/spotify-devs/echostats-api
    tag: latest
    pullPolicy: IfNotPresent
  web:
    repository: ghcr.io/spotify-devs/echostats-web
    tag: latest
    pullPolicy: IfNotPresent

imagePullSecrets: []

# Spotify API
spotify:
  clientId: ""
  clientSecret: ""
  redirectUri: "http://localhost:8000/api/v1/auth/callback"

# Security
security:
  jwtSecret: ""
  encryptionKey: ""

# MongoDB
mongodb:
  # Set to false to use an external MongoDB instance
  enabled: true
  # External MongoDB URI (used when enabled: false)
  external:
    uri: ""
    # e.g. "mongodb://user:pass@mongo.example.com:27017/echostats?authSource=admin"
  image:
    repository: mongo
    tag: "7"
  auth:
    rootUsername: echostats
    rootPassword: changeme
    database: echostats
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""

# Redis
redis:
  # Set to false to use an external Redis instance
  enabled: true
  # External Redis URL (used when enabled: false)
  external:
    url: ""
    # e.g. "redis://redis.example.com:6379/0"
  image:
    repository: redis
    tag: 7-alpine
  persistence:
    enabled: true
    size: 1Gi
    storageClass: ""

# Example: Using external services
# mongodb:
#   enabled: false
#   external:
#     uri: "mongodb://user:pass@192.168.1.100:27017/echostats?authSource=admin"
# redis:
#   enabled: false
#   external:
#     url: "redis://192.168.1.100:6379/0"

# API
api:
  port: 8000
  workers: 2
  logLevel: info
  corsOrigins: "http://localhost:3000"
  syncIntervalMinutes: 15
  analyticsRefreshHours: 6
  resources:
    limits:
      memory: 512Mi
      cpu: 500m
    requests:
      memory: 256Mi
      cpu: 100m

# Web
web:
  port: 3000
  apiUrl: "http://localhost:8000"
  resources:
    limits:
      memory: 256Mi
      cpu: 250m
    requests:
      memory: 128Mi
      cpu: 50m

# Worker
worker:
  resources:
    limits:
      memory: 512Mi
      cpu: 500m
    requests:
      memory: 128Mi
      cpu: 100m

# Ingress
ingress:
  enabled: false
  className: ""
  annotations: {}
  # kubernetes.io/ingress.class: nginx
  # cert-manager.io/cluster-issuer: letsencrypt-prod
  # nginx.ingress.kubernetes.io/proxy-body-size: "50m"

  # Option 1: Host-based routing (separate subdomains)
  # api:
  #   host: api.echostats.example.com
  #   tls: true
  #   secretName: echostats-api-tls
  # web:
  #   host: echostats.example.com
  #   tls: true
  #   secretName: echostats-web-tls

  # Option 2: Path-based routing (single domain)
  hosts:
    - host: echostats.local
      paths:
        - path: /api
          pathType: Prefix
          service: api
        - path: /
          pathType: Prefix
          service: web
  tls: []
  # - secretName: echostats-tls
  #   hosts:
  #     - echostats.local

# Traefik IngressRoute (alternative to nginx Ingress)
# The entire spec is passed through as-is to the IngressRoute resource
ingressRoute:
  enabled: false
  metadata:
    name: echostats
    # namespace: echostats  # defaults to release namespace
  annotations: {}
    # kubernetes.io/ingress.class: traefik-external
  spec:
    entryPoints:
      - websecure
    routes:
      - match: "Host(`echostats.local`) && PathPrefix(`/api`)"
        kind: Rule
        services:
          - name: echostats-api
            port: 8000
        # middlewares:
        #   - name: default-headers
        #     namespace: traefik
      - match: "Host(`echostats.local`)"
        kind: Rule
        services:
          - name: echostats-web
            port: 3000
    tls:
      secretName: echostats-tls
      # certResolver: letsencrypt

# Service
service:
  api:
    type: ClusterIP
    port: 8000
  web:
    type: ClusterIP
    port: 3000

# Autoscaling
autoscaling:
  api:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80
  web:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80
