apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "echostats.fullname" . }}-worker
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "echostats.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.replicaCount.worker }}
  selector:
    matchLabels:
      {{- include "echostats.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
      labels:
        {{- include "echostats.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ .Values.serviceAccount.name | default (include "echostats.fullname" .) }}
      {{- end }}
      containers:
        - name: worker
          image: "{{ .Values.image.api.repository }}:{{ .Values.image.api.tag }}"
          imagePullPolicy: {{ .Values.image.api.pullPolicy }}
          command: ["uv", "run", "arq", "app.tasks.worker.WorkerSettings"]
          envFrom:
            - configMapRef:
                name: {{ include "echostats.fullname" . }}
            - secretRef:
                name: {{ include "echostats.fullname" . }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
